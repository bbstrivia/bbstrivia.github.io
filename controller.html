<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzer</title>
    <link rel="stylesheet" href="main.css">
    <script type="module" src="dbconfig.js"></script>
    <script type="module" src="buzzer.js"></script>
</head>

<body style="background: #833AB4;
background: linear-gradient(40deg, rgba(131, 58, 180, 1) 0%, rgb(23, 7, 73) 70%, rgb(0, 0, 0) 100%); padding: 20px;">
    <div id="team-name"
        style="margin: 20px; margin-top: 40px; padding: 20px; font-size: 40px; font-weight: bold; color: white;">Team:
    </div>
    <div id="team-points"
        style="text-align: right; border: 2px solid white; border-radius: 20px; background-color: black; color: white; height: 50px; margin: 20px; padding: 20px; font-size: 40px;">
        <h4 id="points">0</h4>
    </div>
    <div id="button-container" style="text-align: center; margin-top: 100px;">
        <button id="buzzer"
            style="width: 80vw; height: 80vw; border-radius: 40vw; background-color: rgb(255, 0, 255); box-shadow: 10px 10px 10px 10px rgb(0,0,0,0.2);"></button>
    </div>
</body>

</html>
